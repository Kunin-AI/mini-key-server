---
apiVersion: v1
kind: Namespace
metadata:
  name: ku-keyserver
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ku-keyserver-data
  namespace: ku-keyserver
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: ku-keyserver-secret
  namespace: ku-keyserver
type: Opaque
stringData:
  SECRET_KEY: "1e5XP5Zfz9tCrKoqtJl2u7PwnsDEFpKbpVPpK9E5S40"
  CLAIM_API_KEY: "sJJzYu1Ell0bsCOoZU6XAi3KSs9XR_VTOKMv-zUI52o"
---
apiVersion: v1
kind: Secret
metadata:
  name: tunnel-credentials
  namespace: ku-keyserver
type: Opaque
stringData:
  credentials.json: |
    {"AccountTag":"e4961bc16bb245c858516382bbac1b29","TunnelSecret":"wuEebaaWLAmAat5DKNFbf5gHzCmuNGzvi/yK/oxvQ1E=","TunnelID":"d403fe10-5703-40bc-bf7a-4d08d51252e2","Endpoint":""}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: ku-keyserver
data:
  config.yaml: |
    tunnel: ku-keyserver
    credentials-file: /etc/cloudflared/credentials/credentials.json
    ingress:
      - hostname: licenses.1000ml.io
        service: http://ku-keyserver:80
      - hostname: firstbell.1000ml.io
        service: http://firstbell-landing:80
      - service: http_status:404
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ku-keyserver
  namespace: ku-keyserver
  labels:
    app: ku-keyserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ku-keyserver
  template:
    metadata:
      labels:
        app: ku-keyserver
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: ku-keyserver
          image: ghcr.io/1000ml-io/ku-keyserver:latest
          ports:
            - containerPort: 80
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ku-keyserver-secret
                  key: SECRET_KEY
            - name: DATABASE_URL
              value: "sqlite:////data/sqlite.db"
            - name: CLAIM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ku-keyserver-secret
                  key: CLAIM_API_KEY
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ku-keyserver-data
---
apiVersion: v1
kind: Service
metadata:
  name: ku-keyserver
  namespace: ku-keyserver
spec:
  selector:
    app: ku-keyserver
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: ku-keyserver
  labels:
    app: cloudflared
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          args:
            - tunnel
            - --config
            - /etc/cloudflared/config.yaml
            - run
          resources:
            requests:
              cpu: "25m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          volumeMounts:
            - name: config
              mountPath: /etc/cloudflared
              readOnly: true
            - name: credentials
              mountPath: /etc/cloudflared/credentials
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: cloudflared-config
        - name: credentials
          secret:
            secretName: tunnel-credentials
